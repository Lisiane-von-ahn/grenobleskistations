name: Deploy GrenobleSki Android

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build & sign Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: grenobleski_android_native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('grenobleski_android_native/**/*.gradle*', 'grenobleski_android_native/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEY_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_NAME: "1.${{ github.run_number }}.0"
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: grenobleski-release-${{ github.run_number }}
          path: grenobleski_android_native/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v1.${{ github.run_number }}.0
          name: "GrenobleSki Android v1.${{ github.run_number }}.0"
          body: |
            Automated release from commit ${{ github.sha }}.
            Built by GitHub Actions run #${{ github.run_number }}.
          files: grenobleski_android_native/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
