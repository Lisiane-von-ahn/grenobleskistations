name: Deploy GrenobleSki

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/root/grenobleskistations"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"

            if [ -f docker-compose.yml ]; then
              docker compose -f docker-compose.yml down --remove-orphans || true
            fi

            export GOOGLE_WEB_CLIENT_ID="${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
            export GOOGLE_WEB_CLIENT_SECRET="${{ secrets.GOOGLE_WEB_CLIENT_SECRET }}"
            export GOOGLE_WEB_CLIENT_KEY="${{ secrets.GOOGLE_WEB_CLIENT_KEY }}"

            chmod +x deploy/install.sh
            export USE_INTERNAL_TRAEFIK=false
            ./deploy/install.sh \
              "${{ secrets.DB_HOST }}" \
              "${{ secrets.DB_USER }}" \
              "${{ secrets.DB_PASSWORD }}" \
              "${{ secrets.WEATHER_API_KEY }}" \
              "${{ secrets.DB_NAME }}" \
              "${{ secrets.DB_PORT }}" \
              "${{ secrets.DATABASE_URL }}" \
              "${{ secrets.BOOTSTRAP_ADMIN_USERNAME }}" \
              "${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}" \
              "${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}"

            REQUIRED_PATHS='["/auth/login/","/auth/register/","/auth/google-login/","/auth/me/","/auth/logout/","/messages/","/skistories/","/skipartnerposts/","/instructorservices/","/mobile/"]'

            check_openapi() {
              local url="$1"
              local label="$2"
              local attempts="${3:-20}"
              local delay="${4:-5}"
              local payload=""

              for i in $(seq 1 "$attempts"); do
                if payload="$(curl -fsS "$url")"; then
                  REQUIRED_PATHS="$REQUIRED_PATHS" OPENAPI_PAYLOAD="$payload" python3 -c $'import json, os, sys\nrequired = set(json.loads(os.environ["REQUIRED_PATHS"]))\nspec = json.loads(os.environ["OPENAPI_PAYLOAD"])\npaths = set(spec.get("paths", {}).keys())\nmissing = sorted(required - paths)\nif missing:\n    print("Missing paths:")\n    for path in missing:\n        print(f" - {path}")\n    sys.exit(1)\nprint("OpenAPI check OK")'
                  echo "✅ ${label} OpenAPI check passed"
                  return 0
                fi
                echo "Waiting for ${label} OpenAPI (${i}/${attempts})..."
                sleep "$delay"
              done

              echo "❌ ${label} OpenAPI check failed"
              return 1
            }

            check_openapi "http://127.0.0.1:8081/swagger/?format=openapi" "local"
            check_openapi "https://www.grenobleski.fr/swagger/?format=openapi" "public" 30 10

            check_route() {
              local path="$1"
              local url="https://www.grenobleski.fr${path}"
              local code
              code="$(curl -L -s -o /dev/null -w "%{http_code}" "$url")"
              if [ "$code" = "404" ]; then
                echo "❌ Missing route: $url"
                return 1
              fi
              echo "✅ Route available ($code): $url"
            }

            check_route "/mobile/auth/complete/"
            check_route "/mobile/token-login/"
            check_route "/api/mobile/"
            check_route "/api/mobile/auth/complete/"

            echo "✅ Deployment completed (install.sh is the single source of truth)."
            docker compose -f docker-compose.yml ps || true
