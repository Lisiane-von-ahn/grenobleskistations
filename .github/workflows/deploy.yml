name: Deploy GrenobleSki

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/root/grenobleskistations"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"

            chmod +x deploy/install.sh
            export USE_INTERNAL_TRAEFIK=false
            ./deploy/install.sh \
              "${{ secrets.DB_HOST }}" \
              "${{ secrets.DB_USER }}" \
              "${{ secrets.DB_PASSWORD }}" \
              "${{ secrets.WEATHER_API_KEY }}" \
              "${{ secrets.DB_NAME }}" \
              "${{ secrets.DB_PORT }}" \
              "${{ secrets.DATABASE_URL }}" \
              "${{ secrets.BOOTSTRAP_ADMIN_USERNAME }}" \
              "${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}" \
              "${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}"

            echo "✅ install.sh already applied and verified migrations"
            echo "✅ Re-checking no pending migrations remain"
            docker compose -f docker-compose.yml run --rm --no-deps --entrypoint "" web python manage.py migrate --check --noinput

            WEB_CID=""
            for i in $(seq 1 8); do
              WEB_CID=$(docker compose -f docker-compose.yml ps -q web | head -n1)
              if [ -n "${WEB_CID}" ]; then
                break
              fi
              echo "ℹ️ web container ID not available yet, ensuring service is up (attempt ${i}/8)"
              docker compose -f docker-compose.yml up -d web || true
              sleep 3
            done

            if [ -z "${WEB_CID}" ] && docker inspect grenobleski-web >/dev/null 2>&1; then
              WEB_CID=$(docker inspect --format='{{.Id}}' grenobleski-web)
            fi

            if [ -z "${WEB_CID}" ]; then
              WEB_CID=$(docker ps -aq --filter "label=com.docker.compose.service=web" | head -n1)
            fi

            if [ -z "${WEB_CID}" ]; then
              echo "❌ Could not resolve web container ID from docker compose"
              docker compose -f docker-compose.yml ps || true
              docker ps -a --format 'table {{.ID}}\t{{.Names}}\t{{.Status}}' || true
              exit 1
            fi

            echo "⏳ Waiting for web container health"
            for i in $(seq 1 60); do
              CURRENT_WEB_CID=$(docker compose -f docker-compose.yml ps -q web | head -n1)
              if [ -n "${CURRENT_WEB_CID}" ]; then
                WEB_CID="${CURRENT_WEB_CID}"
              fi

              HEALTH_STATE=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${WEB_CID}" 2>/dev/null || echo "missing")
              CONTAINER_STATE=$(docker inspect --format='{{.State.Status}}' "${WEB_CID}" 2>/dev/null || echo "missing")
              RESTART_COUNT=$(docker inspect --format='{{.RestartCount}}' "${WEB_CID}" 2>/dev/null || echo "0")
              echo "web state: ${CONTAINER_STATE}, health: ${HEALTH_STATE}, restarts: ${RESTART_COUNT}"

              if [ "${RESTART_COUNT}" -ge 3 ] || [ "${HEALTH_STATE}" = "unhealthy" ]; then
                echo "❌ Web container unstable (restarts/unhealthy). Showing logs."
                docker compose -f docker-compose.yml ps || true
                docker compose -f docker-compose.yml logs --tail=200 web || true
                exit 1
              fi

              if [ "${CONTAINER_STATE}" = "running" ] && { [ "${HEALTH_STATE}" = "healthy" ] || [ "${HEALTH_STATE}" = "none" ]; }; then
                break
              fi

              sleep 5
            done

            echo "⏳ Verifying app response from inside web container (:8000)"
            INTERNAL_OK=false
            for i in $(seq 1 40); do
              CURRENT_WEB_CID=$(docker compose -f docker-compose.yml ps -q web | head -n1)
              if [ -n "${CURRENT_WEB_CID}" ]; then
                WEB_CID="${CURRENT_WEB_CID}"
              fi

              if docker exec "${WEB_CID}" sh -lc "curl -fsS -H 'Host: grenobleski.fr' http://127.0.0.1:8000/ >/dev/null"; then
                INTERNAL_OK=true
                echo "✅ App responds inside container"
                break
              fi
              sleep 3
            done

            if [ "${INTERNAL_OK}" != "true" ]; then
              echo "❌ App is healthy but not responding on internal HTTP endpoint"
              docker compose -f docker-compose.yml ps || true
              docker compose -f docker-compose.yml logs --tail=200 web || true
              exit 1
            fi

            echo "⏳ Waiting for app on http://127.0.0.1:8081"
            HOST_OK=false
            for i in $(seq 1 60); do
              if curl -fsS "http://127.0.0.1:8081" >/dev/null || curl -fsS -H "Host: grenobleski.fr" "http://127.0.0.1:8081" >/dev/null; then
                HOST_OK=true
                echo "✅ App is reachable on port 8081"
                echo "🔄 Restarting Traefik"
                if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files 2>/dev/null | grep -q '^traefik\.service'; then
                  systemctl restart traefik || true
                elif docker ps -a --format '{{.Names}}' | grep -Eq '^traefik$|^grenobleski-traefik-1$'; then
                  docker restart traefik >/dev/null 2>&1 || docker restart grenobleski-traefik-1 >/dev/null 2>&1 || true
                else
                  echo "ℹ️ Traefik service/container not found; skipping restart"
                fi
                break
              fi
              sleep 5
            done

            if [ "${HOST_OK}" != "true" ]; then
              echo "⚠️ App not reachable on host port 8081 yet, but container is healthy and serving internally."
              echo "ℹ️ Continuing deployment to avoid false negative; verify reverse proxy routing separately if needed."
              docker compose -f docker-compose.yml ps || true
            fi
