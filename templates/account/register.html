{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<section class="py-5 auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-7 col-xl-6">
                <div class="card border-0 shadow-sm auth-card">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="h4 mb-3 text-center">{% trans "Inscription" %}</h2>
                        <p class="text-muted text-center mb-4">{% trans "Créez votre compte pour acceder aux fonctionnalités premium." %}</p>

                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary w-100">{% trans "S'inscrire" %}</button>
                        </form>

                        <p class="mb-0 mt-3 text-center">{% trans "Déjà un compte ?" %} <a href="{% url 'account_login' %}">{% trans "Connectez-vous ici" %}</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
