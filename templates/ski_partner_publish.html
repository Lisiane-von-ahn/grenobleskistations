{% extends 'base.html' %}
{% load i18n %}

{% block title %}Publier une sortie{% endblock %}

{% block content %}
<div class="container py-4">
    <section class="market-hero mb-4">
        <h2 class="market-section-title mb-1">Publier une sortie partenaire</h2>
        <p class="market-subtle mb-0">Creer une annonce claire pour trouver des partenaires avec le bon niveau.</p>
    </section>

    <section class="market-search-panel">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-lg-6">
                <label class="form-label">Titre</label>
                <input type="text" name="title" maxlength="120" class="form-control" required placeholder="Ex: Ski samedi matin a Chamrousse">
            </div>
            <div class="col-lg-3">
                <label class="form-label">Niveau</label>
                <select name="skill_level" class="form-control" required>
                    {% for code, label in level_choices %}
                    <option value="{{ code }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-lg-3">
                <label class="form-label">Date</label>
                <input type="date" name="preferred_date" class="form-control">
            </div>
            <div class="col-lg-6">
                <label class="form-label">Station</label>
                <select name="ski_station" class="form-control">
                    <option value="">Pas de preference</option>
                    {% for station in stations %}
                    <option value="{{ station.id }}">{{ station.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-lg-6">
                <label class="form-label">Ville de depart</label>
                <input type="text" name="city" maxlength="80" class="form-control" placeholder="Grenoble" list="city-autocomplete-list" data-city-autocomplete="true" autocomplete="address-level2">
            </div>
            <div class="col-12">
                <label class="form-label">Description</label>
                <textarea name="message" rows="4" class="form-control" required placeholder="Niveau, rythme, covoiturage, horaires..."></textarea>
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-success" type="submit">Publier</button>
                <a class="btn btn-outline-secondary" href="{% url 'ski_partners' %}">Retour</a>
            </div>
        </form>
    </section>
</div>
{% endblock %}
